name: Auto-Publish Content

on:
  schedule:
    # Reduced to 2x/week (Mon/Thu) to conserve Netlify credits
    # Monday 8am CT (14:00 UTC) — SEO post + GEO post
    - cron: '0 14 * * 1'
    # Thursday 8am CT (14:00 UTC) — SEO post + GEO post
    - cron: '0 14 * * 4'
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Content type to generate'
        required: true
        default: 'seo_and_geo'
        type: choice
        options:
          - seo_and_geo
          - seo_only
          - geo_only
          - news
          - all

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Anthropic SDK for script
        run: npm install @anthropic-ai/sdk

      - name: Determine content type by schedule
        id: content-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.content_type }}" >> $GITHUB_OUTPUT
          else
            DAY=$(date +%u)
            case $DAY in
              1) echo "type=seo_and_geo" >> $GITHUB_OUTPUT ;;  # Monday
              3) echo "type=news" >> $GITHUB_OUTPUT ;;          # Wednesday
              4) echo "type=seo_and_geo" >> $GITHUB_OUTPUT ;;  # Thursday
              *) echo "type=seo_and_geo" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run first content generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE }}
          CONTENT_TYPE: ${{ steps.content-type.outputs.type }}
        run: node scripts/generate-content.mjs

      - name: Run second news story (Wednesday only)
        if: steps.content-type.outputs.type == 'news'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE }}
          CONTENT_TYPE: news
        run: node scripts/generate-content.mjs

      - name: Commit and push new content
        env:
          CONTENT_TYPE: ${{ steps.content-type.outputs.type }}
        run: |
          git config user.name "Grand Rapids MN Living Bot"
          git config user.email "bot@grandrapidsminnesota.com"
          git add src/content/ scripts/topic-list.json
          if git diff --staged --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Auto-publish: ${CONTENT_TYPE} — $(date +%Y-%m-%d)"
            git push
          fi
